services:
  db:
    image: postgres:16.3
    container_name: op-stack-withdrawals-indexer-db
    ports:
      - "5444:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pwd
      POSTGRES_DB: mychain_indexer
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
